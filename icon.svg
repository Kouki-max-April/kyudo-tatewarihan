<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="#3d2b1f"/>
  <!-- 的（ターゲット）外輪 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#f5e6c8" stroke-width="18"/>
  <!-- 的 中輪 -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#f5e6c8" stroke-width="18"/>
  <!-- 的 内輪 -->
  <circle cx="256" cy="256" r="50" fill="#f5e6c8"/>
  <!-- 矢（横） -->
  <line x1="60" y1="256" x2="390" y2="256" stroke="#c8a44a" stroke-width="14" stroke-linecap="round"/>
  <!-- 矢尻 -->
  <polygon points="390,256 350,236 350,276" fill="#c8a44a"/>
  <!-- 矢羽根 -->
  <path d="M80,256 Q60,230 40,220 Q65,248 40,270 Q60,265 80,256Z" fill="#c8a44a"/>
</svg>
